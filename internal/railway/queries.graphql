query HttpLogsQuery(
  $deploymentId: String!
  $limit: Int
  $startDate: String
  $endDate: String
  $filter: String
) {
  httpLogs(
    deploymentId: $deploymentId
    limit: $limit
    startDate: $startDate
    endDate: $endDate
    filter: $filter
  ) {
    timestamp
    requestId
    method
    path
    host
    httpStatus
    totalDuration
    upstreamRqDuration
    srcIp
    clientUa
    rxBytes
    txBytes
    edgeRegion
    deploymentId
    deploymentInstanceId
    downstreamProto
    upstreamProto
    upstreamAddress
    responseDetails
    upstreamErrors
  }
}

query EnvironmentLogsQuery(
  $environmentId: String!
  $filter: String
  $afterDate: String
  $beforeDate: String
  $afterLimit: Int
  $beforeLimit: Int
  $anchorDate: String
) {
  environmentLogs(
    environmentId: $environmentId
    filter: $filter
    afterDate: $afterDate
    beforeDate: $beforeDate
    afterLimit: $afterLimit
    beforeLimit: $beforeLimit
    anchorDate: $anchorDate
  ) {
    timestamp
    message
    severity
    attributes {
      key
      value
    }
    tags {
      deploymentId
      deploymentInstanceId
      serviceId
      projectId
      environmentId
    }
  }
}

# Infrastructure queries

query TcpProxiesQuery($environmentId: String!, $serviceId: String!) {
  tcpProxies(
    environmentId: $environmentId
    serviceId: $serviceId
  ) {
    id
    domain
    proxyPort
    applicationPort
    environmentId
    serviceId
    createdAt
    updatedAt
  }
}
