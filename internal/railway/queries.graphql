# Resource discovery queries

query Me {
  me {
    id
    name
    email
    workspaces {
      id
      name
      createdAt
    }
  }
}

query DiscoverAll($workspaceId: String, $isEphemeral: Boolean) {
  projects(first: 250, workspaceId: $workspaceId) {
    edges {
      node {
        id
        name
        environments(isEphemeral: $isEphemeral) {
          edges {
            node {
              id
              name
              isEphemeral
              serviceInstances {
                edges {
                  node {
                    serviceId
                    serviceName
                    environmentId
                    region
                    latestDeployment {
                      id
                      status
                    }
                  }
                }
                pageInfo {
                  hasNextPage
                }
              }
            }
          }
          pageInfo {
            hasNextPage
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

# Metrics queries

query Metrics(
  $projectId: String
  $serviceId: String
  $environmentId: String
  $startDate: DateTime!
  $endDate: DateTime
  $measurements: [MetricMeasurement!]!
  $groupBy: [MetricTag!]
  $sampleRateSeconds: Int
  $averagingWindowSeconds: Int
) {
  metrics(
    projectId: $projectId
    serviceId: $serviceId
    environmentId: $environmentId
    startDate: $startDate
    endDate: $endDate
    measurements: $measurements
    groupBy: $groupBy
    sampleRateSeconds: $sampleRateSeconds
    averagingWindowSeconds: $averagingWindowSeconds
  ) {
    measurement
    tags {
      projectId
      serviceId
      environmentId
      deploymentId
      deploymentInstanceId
      region
    }
    values {
      ts
      value
    }
  }
}

query Usage(
  $projectId: String
  $workspaceId: String
  $measurements: [MetricMeasurement!]!
  $groupBy: [MetricTag!]
  $startDate: DateTime
  $endDate: DateTime
) {
  usage(
    projectId: $projectId
    workspaceId: $workspaceId
    measurements: $measurements
    groupBy: $groupBy
    startDate: $startDate
    endDate: $endDate
  ) {
    measurement
    tags {
      projectId
      serviceId
      environmentId
    }
    value
  }
}

query EstimatedUsage(
  $projectId: String
  $workspaceId: String
  $measurements: [MetricMeasurement!]!
) {
  estimatedUsage(
    projectId: $projectId
    workspaceId: $workspaceId
    measurements: $measurements
  ) {
    estimatedValue
    measurement
    projectId
  }
}

# Log queries

query DeploymentLogsQuery(
  $deploymentId: String!
  $limit: Int
  $startDate: DateTime
  $endDate: DateTime
  $filter: String
) {
  deploymentLogs(
    deploymentId: $deploymentId
    limit: $limit
    startDate: $startDate
    endDate: $endDate
    filter: $filter
  ) {
    timestamp
    message
    severity
    attributes {
      key
      value
    }
    tags {
      deploymentId
      deploymentInstanceId
      serviceId
      projectId
      environmentId
    }
  }
}

query BuildLogsQuery(
